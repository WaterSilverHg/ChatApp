# ========================================
# ChatApp Nginx 负载均衡配置
# 用于 WebSocket 和 HTTP 服务的负载均衡
# ========================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    # 开启多路复用
    use epoll;
    multi_accept on;
}

http {
    # 基础配置
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志配置
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 连接配置
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ========================================
    # WebSocket 服务器上游配置
    # ========================================
    upstream websocket_servers {
        # 基于客户端 IP 哈希分配（确保同一用户始终连接到同一服务器）
        ip_hash;
        
        # WebSocket 服务器节点
        server 127.0.0.1:4567;  # Server 1
        server 127.0.0.1:4568;  # Server 2
        # server 192.168.1.100:4567;  # 如果是分布式部署，使用实际 IP
        
        # 健康检查（需要 nginx_upstream_check_module 或商业版）
        # check interval=3000 rise=2 fall=3 timeout=1000 type=http;
        # check_http_send "HEAD /health HTTP/1.0\r\n\r\n";
        # check_http_expect_alive http_2xx http_3xx;
    }

    # ========================================
    # HTTP API 服务器上游配置
    # ========================================
    upstream http_servers {
        # 轮询方式（默认）
        # least_conn;  # 或者使用最少连接数
        # ip_hash;     # 或者使用 IP 哈希
        
        server 127.0.0.1:8080;  # HTTP Server 1
        server 127.0.0.1:8081;  # HTTP Server 2
    }

    # ========================================
    # 主服务器配置
    # ========================================
    server {
        listen 80;
        server_name your-domain.com;  # 替换为你的域名

        # 重定向 HTTP 到 HTTPS（可选）
        return 301 https://$server_name$request_uri;
    }

    # ========================================
    # HTTPS 服务器配置（推荐）
    # ========================================
    server {
        listen 443 ssl;
        server_name your-domain.com;

        # SSL 证书配置
        ssl_certificate /etc/nginx/ssl/your-domain.crt;
        ssl_certificate_key /etc/nginx/ssl/your-domain.key;

        # SSL 优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ========================================
        # WebSocket 代理配置
        # ========================================
        location /ws {
            # 升级协议到 WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 传递客户端真实 IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # 连接超时配置
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 禁用缓冲
            proxy_buffering off;

            # 转发到上游服务器
            proxy_pass http://websocket_servers;
        }

        # ========================================
        # HTTP API 代理配置
        # ========================================
        location /api {
            # 传递客户端真实 IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # 转发到上游服务器
            proxy_pass http://http_servers;
        }

        # ========================================
        # 静态文件服务（如果需要）
        # ========================================
        location /static {
            root /var/www/chatapp;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ========================================
        # 健康检查接口
        # ========================================
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }

    # ========================================
    # 纯 HTTP 配置（开发环境使用）
    # ========================================
    server {
        listen 8080;
        server_name localhost;

        # WebSocket 代理
        location /ws {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_pass http://websocket_servers;
        }

        # HTTP API 代理
        location /api {
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_pass http://http_servers;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }
}